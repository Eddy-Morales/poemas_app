<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>Poemas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="poemas-content">

  <ion-grid fixed>
    <ion-row>

      <ion-col
        size="12"
        size-md="6"
        size-lg="4"
        *ngFor="let poema of poemas">

        <ion-card class="poema-card">

          <img
            class="poema-img"
            [src]="poema.imagen_url || 'assets/icon/default-poema.jpg'"
            alt="Imagen poema"
          >

          <ion-card-header>
            <ion-card-title>
              {{ poema.titulo }}
            </ion-card-title>

            <ion-card-subtitle>
              {{ poema.autor }}
            </ion-card-subtitle>
          </ion-card-header>

          <ion-card-content>

            <div class="fecha">
              {{ poema.created_at | date:'medium' }}
            </div>

            <p class="contenido">
              {{ poema.contenido }}
            </p>

            <!-- AUDIO -->
            <ng-container *ngIf="poema.audio_url as audioUrl">
              <audio controls class="audio-player">
                <source [src]="audioUrl" type="audio/mpeg">
              </audio>
            </ng-container>

            <!-- VIDEO -->
            <ng-container *ngIf="poema.video_url as videoUrl">

              <iframe
                *ngIf="isYouTubeUrl(videoUrl)"
                [src]="getYouTubeEmbedUrl(videoUrl)"
                width="100%"
                height="220"
                frameborder="0"
                allowfullscreen
                class="video-frame">
              </iframe>

            </ng-container>

            <!-- BOTONES -->
            <div class="buttons">

              <ion-button
                expand="block"
                color="warning"
                [routerLink]="['/poemas-form', poema.id]">

                Editar

              </ion-button>

              <ion-button
                expand="block"
                color="danger"
                (click)="eliminar(poema.id!)">

                Eliminar

              </ion-button>

            </div>

          </ion-card-content>

        </ion-card>

      </ion-col>

    </ion-row>
  </ion-grid>

  <!-- FAB -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/poemas-form">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>

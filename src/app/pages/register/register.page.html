<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>Crear cuenta</ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="cancel()">
        Cerrar
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="register-content login-page">

  <div class="register-container login-shell">

    <div class="logo-section login-hero">
      <div class="login-badge">Únete</div>
      <h1>Únete ahora</h1>
      <p>Crea tu cuenta para comenzar</p>
    </div>

    <div class="register-card login-card">

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="field-group">
          <label class="field-label" for="register-email">Email</label>
          <input
            id="register-email"
            class="auth-input"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="Tu correo">
        </div>

        <div class="field-group login-password">
          <label class="field-label" for="register-password">Contraseña</label>
          <input
            id="register-password"
            class="auth-input auth-input-password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="new-password"
            placeholder="Mínimo 6 caracteres">
          <button type="button" class="toggle-password" (click)="togglePassword()" aria-label="Mostrar contraseña">
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </button>
        </div>

        <div *ngIf="error" class="login-message">
          {{ error }}
        </div>

        <ion-button
          expand="block"
          type="submit"
          class="register-button primary-action"
          [disabled]="loading">

          <ion-spinner
            *ngIf="loading"
            name="crescent">
          </ion-spinner>

          <span *ngIf="!loading">
            Crear cuenta
          </span>

        </ion-button>

      </form>

    </div>

  </div>

</ion-content>

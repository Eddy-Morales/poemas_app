<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>Crear cuenta</ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="cancel()">
        Cerrar
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="register-content login-page">

  <div class="register-container login-shell">

    <div class="logo-section login-hero">
      <div class="login-badge">Únete</div>
      <h1>Únete ahora</h1>
      <p>Crea tu cuenta para comenzar</p>
    </div>

    <div class="register-card login-card">

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="field-group">
          <ion-item class="login-item custom-input">
            <ion-label position="floating">Email</ion-label>
            <ion-input
              type="email"
              formControlName="email">
            </ion-input>
          </ion-item>
        </div>

        <div class="field-group login-password">
          <ion-item class="login-item custom-input">
            <ion-label position="floating">Contraseña</ion-label>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password">
            </ion-input>
            <ion-button class="toggle-password" fill="clear" (click)="togglePassword()" aria-label="Mostrar contraseña">
              <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
            </ion-button>
          </ion-item>
        </div>

        <div *ngIf="error" class="login-message">
          {{ error }}
        </div>

        <ion-button
          expand="block"
          type="submit"
          class="register-button primary-action"
          [disabled]="loading">

          <ion-spinner
            *ngIf="loading"
            name="crescent">
          </ion-spinner>

          <span *ngIf="!loading">
            Crear cuenta
          </span>

        </ion-button>

      </form>

    </div>

  </div>

</ion-content>

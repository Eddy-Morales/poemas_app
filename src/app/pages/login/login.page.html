<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>Bienvenido</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="login-content">

  <div class="login-container">

    <div class="logo-section">
      <h1>Mi App</h1>
      <p>Inicia sesión para continuar</p>
    </div>

    <div class="login-card">

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="field-group">
          <label class="field-label" for="login-email">Email</label>
          <input
            id="login-email"
            class="auth-input"
            autocomplete="email"
            type="email"
            formControlName="email"
            placeholder="Tu correo">
        </div>

        <div class="field-group login-password">
          <label class="field-label" for="login-password">Contraseña</label>
          <input
            id="login-password"
            class="auth-input auth-input-password"
            autocomplete="current-password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Tu contraseña">
          <button type="button" class="toggle-password" (click)="togglePassword()" aria-label="Mostrar contraseña">
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </button>
        </div>

        <div *ngIf="error" class="error">
          {{ error }}
        </div>

        <ion-button
          expand="block"
          type="submit"
          class="login-button"
          [disabled]="loading">

          <ion-spinner
            *ngIf="loading"
            name="crescent">
          </ion-spinner>

          <span *ngIf="!loading">Entrar</span>
        </ion-button>

        <div class="register-link">
          <a (click)="openRegister()">
            ¿No tienes cuenta? Crear una
          </a>
        </div>

      </form>

    </div>

  </div>

  <!-- Overlay de bienvenida -->
<div class="welcome-overlay" *ngIf="showWelcome">
  <img src="assets/icon/bienvenida.png" alt="Bienvenido" />
</div>

</ion-content>
